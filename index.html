<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech Hunt</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style type="text/tailwindcss">
@layer utilities {

  /* CRT Effect */
  .crt::before {
    content: "";
    @apply absolute inset-0 pointer-events-none z-[2];
    background:
      linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%),
      linear-gradient(90deg, rgba(255,0,0,0.06), rgba(0,255,0,0.02), rgba(0,0,255,0.06));
    background-size: 100% 2px, 3px 100%;
    animation: flicker 0.15s infinite;
  }

  /* Animations */
  @keyframes flicker {
    0%{opacity:.27} 50%{opacity:.69} 100%{opacity:.32}
  }

  @keyframes fadeIn {
    from {opacity:0; transform:translateY(20px)}
    to {opacity:1; transform:translateY(0)}
  }

  @keyframes shake {
    10%,90%{transform:translateX(-1px)}
    20%,80%{transform:translateX(2px)}
    30%,50%,70%{transform:translateX(-4px)}
    40%,60%{transform:translateX(4px)}
  }

  .animate-fade { animation: fadeIn 0.5s ease-in-out }
  .animate-shake { animation: shake 0.5s }

  /* Timer glow */
  .text-glow {
    text-shadow: 0 0 5px #00ff00, 0 0 10px #00ff00;
  }
}
</style>

</head>

<body class="bg-gray-900 text-gray-200 min-h-screen flex items-center justify-center p-3 sm:p-6 font-[Inter] overflow-hidden relative crt">

<div class="w-full max-w-4xl bg-gray-900/80 border border-green-500 rounded-lg shadow-2xl shadow-green-500/10 p-4 sm:p-8 relative">

  <!-- Header -->
  <div class="text-center mb-4 sm:mb-6 border-b-2 border-green-700 pb-4">
    <h1 class="text-2xl sm:text-5xl font-bold text-green-400 font-['Share_Tech_Mono'] tracking-widest">
      TECH HUNT
    </h1>
    <p class="text-green-500 font-['Share_Tech_Mono'] text-sm sm:text-base">
      The A.I. Lockdown
    </p>
  </div>

  <!-- Timer -->
  <div class="absolute top-3 right-3 sm:top-4 sm:right-4 text-center hidden" id="timer-container">
    <span class="text-green-400 font-['Share_Tech_Mono'] text-xs sm:text-sm">TIME</span>
    <div id="timer" class="text-lg sm:text-2xl font-['Share_Tech_Mono'] text-green-400 text-glow">
      00:00:00
    </div>
  </div>

  <!-- Start Screen -->
  <div id="start-screen" class="text-center">
    <h2 class="text-xl sm:text-2xl text-yellow-300 font-['Share_Tech_Mono'] mb-4">
      SYSTEM ALERT!
    </h2>

    <p class="mb-6 text-base sm:text-lg px-2">
      A rogue AI, 'Nyx', has seized control...
    </p>

    <button id="start-button"
      class="bg-green-500 text-gray-900 font-bold py-3 px-6 sm:px-8 rounded-lg hover:bg-green-400 transition-all duration-300 font-['Share_Tech_Mono'] text-lg sm:text-xl w-full sm:w-auto">
      Initiate Hunt
    </button>
  </div>

  <!-- Main Game -->
  <div id="main-game" class="hidden">

    <!-- Story -->
    <div class="bg-black/50 border border-green-600 p-4 rounded-lg mb-6 animate-fade">
      <p id="story-text" class="text-green-300 text-sm sm:text-lg"></p>
    </div>

    <!-- Challenge -->
    <div class="bg-gray-800 border-2 border-dashed border-green-800 p-4 sm:p-6 rounded-lg animate-fade">
      <h2 class="text-lg sm:text-2xl font-bold text-yellow-400 mb-3 font-['Share_Tech_Mono']">
        [ Challenge <span id="challenge-level">1</span> ]
      </h2>

      <p id="challenge-prompt" class="mb-4 text-sm sm:text-lg"></p>

      <div class="bg-black text-white p-3 sm:p-4 rounded-md font-['Share_Tech_Mono'] text-xs sm:text-sm overflow-x-auto">
        <pre><code id="challenge-code"></code></pre>
      </div>
    </div>

    <!-- Hint -->
    <div class="mt-4 text-center">
      <button id="hint-button"
        class="text-xs sm:text-sm text-yellow-400 font-['Share_Tech_Mono'] hover:underline">
        [ Request Hint (-2 min) ]
      </button>

      <p id="hint-text" class="text-yellow-500 mt-2 hidden text-sm"></p>
    </div>

    <!-- Input -->
    <div class="mt-6 flex flex-col sm:flex-row gap-3 sm:gap-4">

      <input id="answer-input"
        placeholder="Enter solution..."
        class="flex-grow bg-gray-700 border-2 border-green-700 text-green-300 rounded-lg p-3 font-['Share_Tech_Mono'] focus:outline-none focus:ring-2 focus:ring-green-500 w-full"/>

      <button id="submit-button"
        class="bg-green-600 text-gray-900 font-bold py-3 px-6 rounded-lg hover:bg-green-500 transition-all duration-300 font-['Share_Tech_Mono'] w-full sm:w-auto">
        Execute
      </button>

    </div>

    <!-- Result -->
    <div id="result-message" class="mt-4 text-center h-8 font-['Share_Tech_Mono']"></div>

  </div>

</div>

</body>
</html>
